<!DOCTYPE html>
<html>
<head>
    <title>Marcador HIRO Oficial</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: white;
            font-family: sans-serif;
        }
        .marker-container {
            width: 400px;
            height: 400px;
            border: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px;
        }
        /* El diseño exacto del marcador HIRO */
        .hiro-marker {
            width: 100%;
            height: 100%;
            background-color: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .inner-white {
            width: 50%;
            height: 50%;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .inner-symbol {
            width: 60%;
            height: 70%;
            background-color: black;
            /* Esta forma simula el patrón interno del Hiro */
            clip-path: polygon(0% 0%, 100% 0%, 100% 70%, 50% 70%, 50% 100%, 0% 100%);
        }
        .instructions {
            margin-top: 20px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="marker-container">
        <div class="hiro-marker">
            <div class="inner-white">
                <div class="inner-symbol"></div>
            </div>
        </div>
    </div>
    <div class="instructions">
        <p><b>MARCADOR HIRO DE ALTA PRECISIÓN</b></p>
        <p>Apunta con tu móvil a este recuadro negro.</p>
    </div>
</body>
</html>
