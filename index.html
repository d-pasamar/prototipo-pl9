<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BHF-XR · Prototipo Final</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        .nav {
            position: fixed; bottom: 20px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 10px; z-index: 1000;
        }
        button {
            padding: 12px; background: #00e5ff; border: none; color: #000;
            font-weight: bold; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="nav">
        <button onclick="cambiar(0)">PACIENTES</button>
        <button onclick="cambiar(1)">HISTORIAL</button>
        <button onclick="cambiar(2)">IMAGEN</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        
        <a-marker preset="hiro">
            <a-entity id="interfaz" rotation="-90 0 0" position="0 0 0">
                
                <a-box width="2" height="1.2" depth="0.1" color="#001522" opacity="0.9" position="0 0 -0.05"></a-box>

                <a-entity id="sec0" visible="true">
                    <a-text value="LISTADO DE PACIENTES" color="#00e5ff" position="-0.9 0.4 0.06" width="3"></a-text>
                    <a-text value="> Garcia Lopez, J. (BOX 1)\n> Rodriguez, M. (ESPERA)" position="-0.9 0 0.06" width="2.5"></a-text>
                </a-entity>

                <a-entity id="sec1" visible="false">
                    <a-text value="HISTORIAL MEDICO" color="#76ff03" position="-0.9 0.4 0.06" width="3"></a-text>
                    <a-text value="Saturacion: 94%\nFC: 72 bpm\nAlergias: PENICILINA" position="-0.9 0 0.06" width="2.5"></a-text>
                </a-entity>

                <a-entity id="sec2" visible="false">
                    <a-text value="VISOR RADIOLOGICO" color="#ffab00" position="-0.9 0.4 0.06" width="3"></a-text>
                    <a-plane color="#111" width="1" height="0.6" position="0 -0.1 0.07">
                        <a-text value="[ RX TORAX ]" align="center" width="2"></a-text>
                    </a-plane>
                </a-entity>

            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        function cambiar(id) {
            for(let i=0; i<3; i++) {
                document.getElementById('sec'+i).setAttribute('visible', i === id);
            }
        }
    </script>
</body>
</html>
