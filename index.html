<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BHF-XR · AR Médica</title>
<script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@v1.4.2/dist/aframe-master.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; font-family: sans-serif; }
  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    pointer-events: none;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: rgba(0,10,20,0.85);
    border-bottom: 2px solid rgba(0,229,255,0.4);
  }
  .top-bar .logo {
    font-family: monospace;
    font-size: 12px;
    color: #00e5ff;
    letter-spacing: 2px;
  }
  .top-bar .status {
    font-size: 11px;
    color: rgba(200,230,255,0.8);
  }
  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: #76ff03;
    border-radius: 50%;
    margin-right: 5px;
    animation: bd 2s infinite;
  }
  @keyframes bd { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    justify-content: center;
    padding: 8px;
    background: rgba(0,10,20,0.9);
    border-top: 2px solid rgba(0,229,255,0.4);
    gap: 5px;
    pointer-events: auto;
  }
  .nav-btn {
    background: rgba(0,229,255,0.06);
    border: 1px solid rgba(0,229,255,0.3);
    color: rgba(200,230,255,0.8);
    font-size: 11px;
    padding: 8px 12px;
    border-radius: 18px;
    cursor: pointer;
    font-family: monospace;
    transition: all 0.3s;
  }
  .nav-btn.active {
    background: rgba(0,229,255,0.18);
    border-color: #00e5ff;
    color: #00e5ff;
    box-shadow: 0 0 10px rgba(0,229,255,0.3);
  }
  .instructions {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 999;
    background: rgba(0,10,20,0.95);
    border: 2px solid rgba(0,229,255,0.4);
    border-radius: 16px;
    padding: 28px;
    text-align: center;
    color: #00e5ff;
    max-width: 300px;
    pointer-events: auto;
  }
  .instructions h2 { font-size: 20px; margin-bottom: 10px; letter-spacing: 3px; }
  .instructions p { font-size: 13px; color: rgba(200,230,255,0.7); line-height: 1.6; margin-bottom: 14px; }
  .start-btn {
    background: rgba(0,229,255,0.15);
    border: 2px solid #00e5ff;
    color: #00e5ff;
    padding: 12px 35px;
    border-radius: 25px;
    font-size: 15px;
    cursor: pointer;
    font-family: monospace;
    letter-spacing: 1px;
  }
  .hidden { display: none !important; }
  .gesture-bar {
    position: fixed;
    bottom: 52px; left: 0; right: 0;
    text-align: center;
    z-index: 999;
    pointer-events: none;
  }
  .gesture-bar span {
    font-family: monospace;
    font-size: 10px;
    color: rgba(0,229,255,0.6);
    background: rgba(0,10,20,0.7);
    padding: 4px 10px;
    border-radius: 8px;
  }
</style>
</head>
<body>

<div class="instructions" id="intro">
  <h2>BHF-XR</h2>
  <p>Prototipo AR — Interfaz Medica<br><br>
  Apunta la camara al marcador <b>HIRO</b>.<br>
  Los paneles se proyectaran sobre el.<br><br>
  Acerca el movil al marcador (20-30cm).</p>
  <button class="start-btn" onclick="startAR()">INICIAR AR</button>
</div>

<div class="overlay" id="topbar" style="display:none;">
  <div class="top-bar">
    <div class="logo">BHF-XR</div>
    <div class="status"><span class="status-dot"></span>Dra. Martin</div>
  </div>
</div>

<div class="gesture-bar" id="ghint" style="display:none;">
  <span>Apunta al marcador HIRO a 20-30cm</span>
</div>

<div class="bottom-nav" id="nav" style="display:none;">
  <button class="nav-btn active" onclick="showPanel(0, this)">Pacientes</button>
  <button class="nav-btn" onclick="showPanel(1, this)">Historial</button>
  <button class="nav-btn" onclick="showPanel(2, this)">Dictado</button>
  <button class="nav-btn" onclick="showPanel(3, this)">Imagen</button>
</div>

  style="display:none;"

<script>
function startAR() {
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('arscene').style.display = '';
  document.getElementById('topbar').style.display = '';
  document.getElementById('nav').style.display = '';
  document.getElementById('ghint').style.display = '';
}

function showPanel(index, btn) {
  for (let i = 0; i < 4; i++) {
    const p = document.getElementById('panel-' + i);
    if (p) p.setAttribute('visible', i === index);
  }
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}
</script>
