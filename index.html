<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BHF-XR · Realidad Aumentada Médica</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap');

        body { margin: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; }

        /* Pantalla de Inicio */
        #intro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #001a2a 0%, #000810 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; color: #00e5ff; text-align: center;
        }
        .btn-start {
            padding: 15px 40px; font-size: 20px; font-weight: bold;
            background: none; border: 2px solid #00e5ff; color: #00e5ff;
            cursor: pointer; border-radius: 5px; box-shadow: 0 0 15px rgba(0,229,255,0.4);
        }
        .hidden { display: none !important; }

        /* Interfaz HUD Fija */
        .hud-overlay {
            position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 1000;
        }
        .top-bar {
            background: rgba(0, 10, 20, 0.8); padding: 15px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.3);
            display: flex; justify-content: space-between; color: #00e5ff;
        }
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(0, 5, 10, 0.9); display: flex;
            justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(0, 229, 255, 0.3); pointer-events: auto;
        }
        .nav-btn {
            color: #555; font-size: 12px; text-align: center; cursor: pointer;
        }
        .nav-btn.active { color: #00e5ff; text-shadow: 0 0 10px #00e5ff; }
    </style>
</head>

<body>

    <div id="intro">
        <h1 style="letter-spacing: 5px;">⬡ BHF-XR</h1>
        <p style="margin-bottom: 30px;">PROTOTIPO DE INTERFAZ MÉDICA HOLOGRÁFICA</p>
        <button class="btn-start" onclick="startAR()">INICIAR AR</button>
    </div>

    <div id="ui-layer" class="hidden">
        <div class="hud-overlay">
            <div class="top-bar">
                <span>ID: XP-2026-MED</span>
                <span style="color: #76ff03;">● SISTEMA ACTIVO</span>
            </div>
        </div>
        
        <div class="nav-bar">
            <div class="nav-btn active" onclick="switchPanel(0)">PACIENTES</div>
            <div class="nav-btn" onclick="switchPanel(1)">HISTORIAL</div>
            <div class="nav-btn" onclick="switchPanel(2)">DICTADO IA</div>
            <div class="nav-btn" onclick="switchPanel(3)">IMAGEN</div>
        </div>
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        renderer="logarithmicDepthBuffer: true;"
        vr-mode-ui="enabled: false"
        id="ar-scene"
        style="opacity: 0;">

        <a-marker preset="hiro" id="hiro-marker">
            
            <a-entity id="main-hud" position="0 0 0.2" rotation="0 0 0">
                
                <a-plane width="2" height="1.2" color="#001522" opacity="0.9" side="double">
                    <a-ring color="#00e5ff" radius-inner="0.02" radius-outer="0.03" position="-0.9 0.5 0.01"></a-ring>
                </a-plane>

                <a-entity id="panel-0" visible="true">
                    <a-text value="LISTA DE TRIAGE" color="#00e5ff" position="-0.9 0.4 0.02" width="2.5"></a-text>
                    <a-text value="1. Juan Garcia - Urgente\n2. Maria Lopez - Estable\n3. Pedro Picapiedra - Critico" 
                            color="white" position="-0.9 0 0.02" width="2"></a-text>
                </a-entity>

                <a-entity id="panel-1" visible="false">
                    <a-text value="HISTORIAL CLINICO" color="#00e5ff" position="-0.9 0.4 0.02" width="2.5"></a-text>
                    <a-text value="Ultima consulta: 15/04/2026\nTratamiento: Amoxicilina 500mg\nNo alergias conocidas." 
                            color="#76ff03" position="-0.9 0 0.02" width="2"></a-text>
                </a-entity>

                <a-entity id="panel-2" visible="false">
                    <a-text value="WHISPER IA - DICTADO" color="#00e5ff" position="-0.9 0.4 0.02" width="2.5"></a-text>
                    <a-text value="ESCUCHANDO...\n'El paciente presenta una\nmejora en la saturacion...'" 
                            color="#ffab00" position="-0.9 0 0.02" width="2"></a-text>
                </a-entity>

                <a-entity id="panel-3" visible="false">
                    <a-text value="VISOR DE RAYOS X" color="#00e5ff" position="-0.9 0.4 0.02" width="2.5"></a-text>
                    <a-box position="0 -0.1 0.05" scale="0.6 0.4 0.01" color="#222" opacity="0.5">
                        <a-text value="[ Rx TORAX ]" align="center" width="1.5"></a-text>
                    </a-box>
                </a-entity>

            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        function startAR() {
            document.getElementById('intro').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            const scene = document.getElementById('ar-scene');
            scene.style.opacity = "1";
            
            // Forzar actualización de cámara
            window.dispatchEvent(new Event('resize'));
        }

        function switchPanel(id) {
            // Actualizar botones
            const btns = document.querySelectorAll('.nav-btn');
            btns.forEach((btn, index) => {
                btn.classList.toggle('active', index === id);
            });

            // Actualizar Paneles 3D
            for (let i = 0; i < 4; i++) {
                document.getElementById('panel-' + i).setAttribute('visible', i === id);
            }
        }
    </script>
</body>
</html>
