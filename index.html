<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BHF-XR · HUD Médico Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap');

:root {
  --cyan: #00e5ff;
  --green: #76ff03;
  --amber: #ffab00;
  --border: rgba(0,229,255,0.3);
  --panel: rgba(0,20,35,0.85);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#000; font-family:'Rajdhani',sans-serif; color:white; }

/* Cámara de fondo */
#camera { position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:1; }

/* Capa de la derecha: Donde aparecerá la imagen grande */
#right-projection {
  position: fixed; top: 10%; right: 5%; width: 50%; height: 75%;
  z-index: 100; display: none;
  border: 1px solid var(--cyan); background: rgba(0,20,40,0.6);
  backdrop-filter: blur(10px); border-radius: 12px;
  box-shadow: 0 0 30px rgba(0,229,255,0.2);
  padding: 10px; animation: slideIn 0.3s ease-out;
}
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

#right-projection img { width: 100%; height: 100%; object-fit: contain; }
.close-hint { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 12px; color: var(--cyan); font-family: 'Share Tech Mono'; }

/* HUD Izquierdo (38% de ancho) */
.hud {
  position:fixed; top:0; left:0; width:38%; height:100%; z-index:50;
  background:var(--panel); border-right:1px solid var(--border);
  display:flex; flex-direction:column; opacity:0; transition: opacity 0.5s;
}
.hud.visible { opacity:1; }

/* Navegación y Pantallas (Scroll original) */
.panel-nav { display:flex; padding:10px; gap:5px; border-bottom:1px solid var(--border); }
.nav-btn { flex:1; padding:8px; font-size:10px; background:none; border:1px solid var(--border); color:var(--cyan); border-radius:10px; cursor:pointer; }
.nav-btn.active { background: rgba(0,229,255,0.2); font-weight:bold; }

.screen { display:none; padding:15px; overflow-y:auto; flex:1; }
.screen.active { display:flex; flex-direction:column; gap:10px; }

/* Estilo de los paneles internos */
.panel { background:rgba(0,40,60,0.5); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:10px; }
.panel-title { font-size:12px; color:var(--cyan); text-transform:uppercase; margin-bottom:8px; letter-spacing:1px; }

/* El cuadro disparador en la sección Imagen */
.xray-trigger {
  width:100%; height:120px; border:2px dashed var(--cyan); border-radius:8px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; background: rgba(0,229,255,0.05); transition: 0.3s;
}
.xray-trigger:active { background: rgba(0,229,255,0.2); }

/* Pantalla de inicio */
.intro { position:fixed; inset:0; background:#000810; z-index:500; display:flex; align-items:center; justify-content:center; flex-direction:column; }
.start-btn { padding:15px 40px; border:1px solid var(--cyan); background:none; color:var(--cyan); border-radius:30px; cursor:pointer; font-family:'Share Tech Mono'; }
</style>
</head>
<body>

<video id="camera" autoplay playsinline muted></video>

<div id="right-projection" onclick="this.style.display='none'">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Chest_Xray_PA_3-14-2010.png/640px-Chest_Xray_PA_3-14-2010.png" alt="Xray">
  <div class="close-hint">TOCA PARA CERRAR</div>
</div>

<div class="intro" id="intro">
  <h2 style="color:var(--cyan); margin-bottom:20px;">⬡ BHF-XR</h2>
  <button class="start-btn" onclick="startAR()">INICIAR AR</button>
</div>

<div class="hud" id="hud">
  <div class="panel-nav">
    <button class="nav-btn active" id="nb0" onclick="goTo(0)">PACIENTES</button>
    <button class="nav-btn" id="nb1" onclick="goTo(1)">HISTORIAL</button>
    <button class="nav-btn" id="nb3" onclick="goTo(3)">IMAGEN</button>
  </div>

  <div class="screen active" id="s0">
    <div class="panel"><div class="panel-title">PACIENTES</div><p>Juan García López (68a)</p></div>
  </div>

  <div class="screen" id="s1">
    <div class="panel"><div class="panel-title">HISTORIAL</div><p>Neumonía previa (12/03/2026)</p></div>
  </div>

  <div class="screen" id="s3">
    <div class="panel">
      <div class="panel-title">ESTUDIO RADIOLÓGICO</div>
      <div class="xray-trigger" onclick="projectXray()">
        <span style="font-size:30px;">🫁</span>
        <p style="font-size:12px; margin-top:5px;">TOCA PARA PROYECTAR</p>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">HALLAZGOS IA</div>
      <p style="color:var(--amber); font-size:14px;">⚠ Opacidad residual LID</p>
    </div>
  </div>
</div>

<script>
async function startAR() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('hud').classList.add('visible');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    document.getElementById('camera').srcObject = stream;
  } catch (err) { console.log("Demo sin cámara"); }
}

function goTo(index) {
  for (let i = 0; i < 4; i++) {
    const s = document.getElementById('s' + i);
    const n = document.getElementById('nb' + i);
    if(s) s.classList.remove('active');
    if(n) n.classList.remove('active');
  }
  document.getElementById('s' + index).classList.add('active');
  document.getElementById('nb' + index).classList.add('active');
  // Al cambiar de pantalla, cerramos la proyección por si estaba abierta
  document.getElementById('right-projection').style.display = 'none';
}

function projectXray() {
  const proj = document.getElementById('right-projection');
  proj.style.display = 'block';
}
</script>
</body>
</html>
