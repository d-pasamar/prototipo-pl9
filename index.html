<!DOCTYPE html>
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.overlay {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  color: cyan;
  background: rgba(0,0,0,0.6);
  padding: 10px 20px;
  border-radius: 10px;
  border: 1px solid cyan;
}
</style>
</head>

<body>

<div class="overlay">
  ⬡ BHF-XR · AR Médica
</div>

<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
  renderer="logarithmicDepthBuffer: true;"
>

  <a-marker preset="hiro">

    <!-- PANEL PRINCIPAL -->
    <a-plane
      position="0 0.5 0"
      rotation="-90 0 0"
      width="1.6"
      height="0.9"
      color="#001522"
      opacity="0.85"
    >
    </a-plane>

    <!-- TEXTO -->
    <a-text
      value="BHF-XR\nPaciente: Juan Garcia\nSpO2: 94%"
      color="#00FFFF"
      align="center"
      width="2"
      position="0 0.55 0.01"
      rotation="-90 0 0"
    ></a-text>

    <!-- BOX 3D -->
    <a-box
      position="0 0.2 0"
      rotation="0 45 0"
      color="#00FFFF"
      depth="0.2"
      height="0.2"
      width="0.2"
      animation="property: rotation; to: 0 405 0; loop: true; dur: 4000"
    ></a-box>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
