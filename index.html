<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BHF-XR · Fix Vertical</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&display=swap');
        body { margin: 0; overflow: hidden; font-family: 'Rajdhani', sans-serif; }
        #intro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000810; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 2000; color: #00e5ff;
        }
        .btn {
            padding: 15px 30px; border: 2px solid #00e5ff; background: none;
            color: #00e5ff; cursor: pointer; font-size: 18px; font-family: 'Rajdhani';
        }
        .nav {
            position: fixed; bottom: 20px; width: 100%; display: flex;
            justify-content: center; gap: 10px; z-index: 1000;
        }
        .nav button {
            background: rgba(0,20,30,0.8); border: 1px solid #00e5ff;
            color: white; padding: 10px; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="intro">
        <h1>⬡ BHF-XR SISTEMA ACTIVO</h1>
        <button class="btn" onclick="start()">CONECTAR HUD</button>
    </div>

    <div class="nav" id="ui" style="display:none">
        <button onclick="show(0)">PACIENTES</button>
        <button onclick="show(1)">HISTORIAL</button>
        <button onclick="show(2)">IMAGEN</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        
        <a-marker preset="hiro">
            <a-entity id="hud" rotation="0 0 0" position="0 0 0.1">
                
                <a-plane width="1.8" height="1.2" color="#001522" opacity="0.9"></a-plane>

                <a-entity id="p0" visible="true">
                    <a-text value="TRIAGE ACTIVO" color="#00e5ff" position="-0.8 0.4 0.01" width="3"></a-text>
                    <a-text value="> Garcia, Juan - BOX 02\n> Lopez, Maria - ESPERA\n> Ruiz, Alberto - REANIMACION" 
                            position="-0.8 0 0.01" width="2"></a-text>
                </a-entity>

                <a-entity id="p1" visible="false">
                    <a-text value="HISTORIAL CLINICO" color="#76ff03" position="-0.8 0.4 0.01" width="3"></a-text>
                    <a-text value="Alergias: Penicilina\nUltima Rx: Hace 2 dias\nEstado: Estable" 
                            position="-0.8 0 0.01" width="2"></a-text>
                </a-entity>

                <a-entity id="p2" visible="false">
                    <a-text value="VISOR DE IMAGEN" color="#ffab00" position="-0.8 0.4 0.01" width="3"></a-text>
                    <a-box color="#222" scale="0.8 0.5 0.01" position="0 -0.1 0.01">
                        <a-text value="[ SIMULACION RX ]" align="center" width="1.5"></a-text>
                    </a-box>
                </a-entity>

                <a-box position="0.7 -0.4 0.1" scale="0.15 0.15 0.15" color="cyan"
                       animation="property: rotation; to: 0 360 360; loop: true; dur: 3000"></a-box>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        function start() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
        }

        function show(id) {
            for(let i=0; i<3; i++) {
                document.getElementById('p'+i).setAttribute('visible', i === id);
            }
        }
    </script>
</body>
</html>
