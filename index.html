<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BHF-XR · AR Médica</title>
<script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@v1.4.2/dist/aframe-master.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; font-family: sans-serif; }

  /* Overlay UI */
  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    pointer-events: none;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: rgba(0,10,20,0.75);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(0,229,255,0.2);
  }
  .top-bar .logo {
    font-family: monospace;
    font-size: 11px;
    color: #00e5ff;
    letter-spacing: 2px;
  }
  .top-bar .status {
    font-size: 11px;
    color: rgba(200,230,255,0.7);
  }
  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: #76ff03;
    border-radius: 50%;
    margin-right: 4px;
    animation: blink-dot 2s infinite;
  }
  @keyframes blink-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    justify-content: center;
    padding: 10px;
    background: rgba(0,10,20,0.8);
    backdrop-filter: blur(8px);
    border-top: 1px solid rgba(0,229,255,0.2);
    gap: 6px;
    pointer-events: auto;
  }
  .nav-btn {
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.2);
    color: rgba(200,230,255,0.7);
    font-size: 11px;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s;
    font-family: monospace;
  }
  .nav-btn.active, .nav-btn:active {
    background: rgba(0,229,255,0.15);
    border-color: #00e5ff;
    color: #00e5ff;
    box-shadow: 0 0 12px rgba(0,229,255,0.2);
  }

  /* Instruction overlay */
  .instructions {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 999;
    background: rgba(0,10,20,0.9);
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 16px;
    padding: 30px;
    text-align: center;
    color: #00e5ff;
    max-width: 320px;
    pointer-events: auto;
    backdrop-filter: blur(10px);
  }
  .instructions h2 {
    font-size: 18px;
    margin-bottom: 12px;
    letter-spacing: 2px;
  }
  .instructions p {
    font-size: 13px;
    color: rgba(200,230,255,0.7);
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .instructions .start-btn {
    background: rgba(0,229,255,0.12);
    border: 1px solid #00e5ff;
    color: #00e5ff;
    padding: 10px 30px;
    border-radius: 25px;
    font-size: 14px;
    cursor: pointer;
    font-family: monospace;
    letter-spacing: 1px;
    transition: all 0.3s;
  }
  .instructions .start-btn:active {
    background: rgba(0,229,255,0.3);
  }
  .hidden { display: none !important; }

  /* Gesture hint */
  .gesture-bar {
    position: fixed;
    bottom: 55px; left: 0; right: 0;
    text-align: center;
    z-index: 999;
    pointer-events: none;
  }
  .gesture-bar span {
    font-family: monospace;
    font-size: 10px;
    color: rgba(0,229,255,0.5);
    background: rgba(0,10,20,0.6);
    padding: 4px 12px;
    border-radius: 10px;
  }
</style>
</head>
<body>

<!-- Instruction overlay -->
<div class="instructions" id="intro">
  <h2>⬡ BHF-XR</h2>
  <p>Prototipo AR — Interfaz Médica<br><br>
  Apunta la cámara al marcador <b>HIRO</b> impreso.<br>
  Los paneles HUD se proyectarán sobre él.<br><br>
  Usa los botones inferiores para cambiar de pantalla.</p>
  <button class="start-btn" onclick="startAR()">INICIAR AR</button>
</div>

<!-- Top bar overlay -->
<div class="overlay" id="topbar" style="display:none;">
  <div class="top-bar">
    <div class="logo">⬡ BHF-XR</div>
    <div class="status"><span class="status-dot"></span>Dra. Martín · AR activo</div>
  </div>
</div>

<!-- Gesture hint -->
<div class="gesture-bar" id="ghint" style="display:none;">
  <span>👋 Apunta al marcador HIRO · Cambia pantalla abajo</span>
</div>

<!-- Bottom nav -->
<div class="bottom-nav" id="nav" style="display:none;">
  <button class="nav-btn active" onclick="showPanel(0, this)">📋 Pacientes</button>
  <button class="nav-btn" onclick="showPanel(1, this)">📁 Historial</button>
  <button class="nav-btn" onclick="showPanel(2, this)">🎤 Dictado</button>
  <button class="nav-btn" onclick="showPanel(3, this)">🫁 Imagen</button>
</div>

<!-- A-Frame AR scene -->
<a-scene

  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  renderer="logarithmicDepthBuffer: true; colorManagement: true;"
  vr-mode-ui="enabled: false"
>
  <a-marker preset="hiro" id="marker">

    <!-- Panel 0: Patient List -->
    <a-entity id="panel-0" position="0 0 0.1" rotation="0 0 0" visible="true">
      <!-- Background -->
      <a-plane width="2.4" height="1.6" color="#001420" opacity="0.88" side="double"></a-plane>
      <a-plane width="2.4" height="1.6" color="#00e5ff" opacity="0.05" side="double" position="0 0 0.001"></a-plane>

      <a-plane width="2.42" height="0.02" color="#00e5ff" opacity="0.4" position="0 0.8 0.002" side="double"></a-plane>

      <a-plane width="0.02" height="0.28" color="#76ff03" opacity="0.8" position="-1.1 0.38 0.006" side="double"></a-plane>
      <a-text value="Juan Garcia Lopez · 68a" color="#e0f0ff" width="1.8" position="-1.0 0.42 0.01" font="monoid" anchor="left"></a-text>
      <a-text value="Revision neumologia" color="#ffab00" width="1.5" position="-1.0 0.34 0.01" font="monoid" anchor="left"></a-text>
      <a-text value="09:30 EN CURSO" color="#76ff03" width="1.2" position="0.6 0.38 0.01" font="monoid" anchor="left"></a-text>
      <!-- Patient 2 -->
      <a-plane width="2.2" height="0.28" color="#003040" opacity="0.4" position="0 0.05 0.005" side="double"></a-plane>
      <a-plane width="0.02" height="0.28" color="#00e5ff" opacity="0.5" position="-1.1 0.05 0.006" side="double"></a-plane>
      <a-text value="Maria Rodriguez · 45a" color="#e0f0ff" width="1.8" position="-1.0 0.09 0.01" font="monoid" anchor="left"></a-text>
      <a-text value="Dolor toracico" color="#ffab00" width="1.5" position="-1.0 0.01 0.01" font="monoid" anchor="left"></a-text>
      <a-text value="10:15 ESPERANDO" color="#00e5ff" width="1.2" position="0.6 0.05 0.01" font="monoid" anchor="left"></a-text>
      <!-- Patient 3 -->

      <a-plane width="0.02" height="0.28" color="#00e5ff" opacity="0.5" position="-1.1 -0.28 0.006" side="double"></a-plane>
      <a-text value="Carlos Fernandez · 72a" color="#e0f0ff" width="1.8" position="-1.0 -0.24 0.01" font="monoid" anchor="left"></a-text>
      <a-text value="EPOC estadio III" color="#ffab00" width="1.5" position="-1.0 -0.32 0.01" font="monoid" anchor="left"></a-text>
      <a-text value="11:00 ESPERANDO" color="#00e5ff" width="1.2" position="0.6 -0.28 0.01" font="monoid" anchor="left"></a-text>
      <!-- Patient 4 -->
      <a-plane width="2.2" height="0.28" color="#003040" opacity="0.4" position="0 -0.61 0.005" side="double"></a-plane>
      <a-plane width="0.02" height="0.28" color="#00e5ff" opacity="0.5" position="-1.1 -0.61 0.006" side="double"></a-plane>
      <a-text value="Ana Moreno Ruiz · 34a" color="#e0f0ff" width="1.8" position="-1.0 -0.57 0.01" font="monoid" anchor="left"></a-text>
      <a-text value="Anemia ferropenica" color="#ffab00" width="1.5" position="-1.0 -0.65 0.01" font="monoid" anchor="left"></a-text>

      <a-plane width="0.02" height="1.6" color="#00e5ff" opacity="0.4" position="1.2 0 0.002" side="double"></a-plane>
      <!-- Header -->

      <a-text value="Juan Garcia Lopez · HC-2026-04821 · 68a" color="#90b0c0" width="1.8" position="-1.05 0.55 0.01" font="monoid" anchor="left"></a-text>
      <!-- Vitals row -->
      <a-plane width="0.45" height="0.3" color="#003040" opacity="0.6" position="-0.82 0.32 0.005" side="double"></a-plane>
      <a-text value="72" color="#76ff03" width="1.8" position="-0.82 0.36 0.01" font="monoid" align="center"></a-text>

      <a-text value="Temp C" color="#607080" width="1.2" position="0.72 0.28 0.01" font="monoid" align="center"></a-text>
      <!-- History entries -->
      <a-text value="--- HISTORIAL ---" color="#00e5ff" width="1.5" position="-1.05 0.1 0.01" font="monoid" anchor="left"></a-text>
      <a-text value="12/03 Neumonia LID. Amoxi-Clav" color="#c0d8e8" width="1.8" position="-1.05 0.0 0.01" font="monoid" anchor="left"></a-text>

      <!-- Tests -->
      <a-text value="--- PRUEBAS ---" color="#00e5ff" width="1.5" position="-1.05 -0.38 0.01" font="monoid" anchor="left"></a-text>
      <a-text value="Rx Torax PA      12/03/26" color="#c0d8e8" width="1.8" position="-1.05 -0.48 0.01" font="monoid" anchor="left"></a-text>
      <a-text value="Analitica        12/03/26" color="#c0d8e8" width="1.8" position="-1.05 -0.58 0.01" font="monoid" anchor="left"></a-text>
      <a-text value="Espirometria     15/11/25" color="#c0d8e8" width="1.8" position="-1.05 -0.68 0.01" font="monoid" anchor="left"></a-text>
    </a-entity>

    <!-- Panel 2: Dictation -->
    <a-entity id="panel-2" position="0 0 0.1" rotation="0 0 0" visible="false">
      <a-plane width="2.4" height="1.6" color="#001420" opacity="0.88" side="double"></a-plane>
      <a-plane width="2.42" height="0.02" color="#00e5ff" opacity="0.4" position="0 0.8 0.002" side="double"></a-plane>
      <a-plane width="2.42" height="0.02" color="#00e5ff" opacity="0.4" position="0 -0.8 0.002" side="double"></a-plane>

      </a-circle>
      <a-text value="REC - Whisper STT" color="#ff1744" width="1.5" position="-0.9 0.5 0.01" font="monoid" anchor="left"></a-text>
      <a-text value="LLM: Llama-3 8B" color="#607080" width="1.2" position="0.5 0.5 0.01" font="monoid" anchor="left"></a-text>
      <!-- Transcription -->
      <a-plane width="2.2" height="0.5" color="#002030" opacity="0.6" position="0 0.2 0.005" side="double"></a-plane>
      <a-text value="Paciente 68a. Mejoria clinica\ntras neumonia. Sin disnea ni\ntos. MVC bilateral. SpO2 94%." color="#e0f0ff" width="1.8" position="-1.0 0.3 0.01" font="monoid" anchor="left" wrap-count="36"></a-text>
      <!-- SOAP -->
      <a-text value="--- FORMATO SOAP ---" color="#00e5ff" width="1.5" position="-1.05 -0.12 0.01" font="monoid" anchor="left"></a-text>
      <a-plane width="1.05" height="0.25" color="#002530" opacity="0.5" position="-0.55 -0.32 0.005" side="double"></a-plane>

    </a-entity>

    <!-- Panel 3: Image Viewer -->
    <a-entity id="panel-3" position="0 0 0.1" rotation="0 0 0" visible="false">
      <a-plane width="2.4" height="1.6" color="#001420" opacity="0.88" side="double"></a-plane>
      <a-plane width="2.42" height="0.02" color="#00e5ff" opacity="0.4" position="0 0.8 0.002" side="double"></a-plane>

  <a-entity camera></a-entity>
</a-scene>

<script>
function startAR() {
  document.getElementById('intro').classList.add('hidden');

  // En lugar de display, cambiamos la opacidad y forzamos el redimensionado
  const scene = document.getElementById('arscene');
  scene.style.opacity = "1";
 
  // document.getElementById('arscene').style.display = '';
  document.getElementById('topbar').style.display = '';
  document.getElementById('nav').style.display = '';
  document.getElementById('ghint').style.display = '';

  // Truco para móviles: avisar al navegador que el tamaño ha cambiado
  window.dispatchEvent(new Event('resize'));
}

let currentPanel = 0;
function showPanel(index, btn) {
  for (let i = 0; i < 4; i++) {
    const panel = document.getElementById('panel-' + i);
    if (panel) panel.setAttribute('visible', i === index);
  }
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  currentPanel = index;
}
</script>

</body>
</html>
